name = "galer"
main = "src/bot.ts"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]

#[[kv_namespaces]]
#binding = "KV"
#id = "PLACEHOLDER_KV_NAMESPACE_ID"

[ai]
binding = "AI"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
