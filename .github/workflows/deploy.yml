name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install denoflare
        run: deno install --global -A -r -f --name denoflare https://raw.githubusercontent.com/skymethod/denoflare/v0.7.0/cli/cli.ts

      - name: Inject secrets into .denoflare
        run: |
          sed -i "s/PLACEHOLDER_BOT_TOKEN/${{ secrets.BOT_TOKEN }}/g"             .denoflare
          sed -i "s/PLACEHOLDER_GROQ_API_KEY/${{ secrets.GROQ_API_KEY }}/g"       .denoflare
          sed -i "s/PLACEHOLDER_OWNER_ID/${{ secrets.OWNER_ID }}/g"               .denoflare
          sed -i "s/PLACEHOLDER_TAVILY_API_KEY/${{ secrets.TAVILY_API_KEY }}/g"   .denoflare
          sed -i "s/PLACEHOLDER_LOG_CHAT_ID/${{ secrets.LOG_CHAT_ID }}/g"         .denoflare
          sed -i "s/PLACEHOLDER_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g" .denoflare
          sed -i "s/PLACEHOLDER_CF_ACCOUNT_ID/${{ secrets.CF_ACCOUNT_ID }}/g"     .denoflare
          sed -i "s/PLACEHOLDER_CF_API_TOKEN/${{ secrets.CF_API_TOKEN }}/g"       .denoflare

      - name: Deploy
        run: denoflare push galer --profile main
